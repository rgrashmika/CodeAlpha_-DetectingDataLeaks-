<!DOCTYPE html>
<html>
<head>
    <title>Secure Cloud Vault</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; color: white; text-align: center; }
        .box { background: #34495e; padding: 30px; border-radius: 15px; display: inline-block; margin-top: 100px; }
        input { display: block; margin: 15px auto; padding: 10px; width: 250px; border-radius: 5px; border: none; }
        button { background: #27ae60; color: white; border: none; padding: 10px 25px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔐 Register for Cloud Vault</h2>
		<form action="register" method="POST">
		    <input type="text" name="username" placeholder="Enter Username" required>
		    <input type="password" name="password" placeholder="Enter Password" required>
		    <button type="submit">Encrypt & Save</button>
		</form>
    </div>
</body>
</html>
